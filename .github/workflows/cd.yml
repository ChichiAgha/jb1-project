name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build and start stack
        run: docker compose up -d --build --wait

      - name: Run smoke tests
        run: sh scripts/smoke-test.sh

      - name: Run backend CRUD tests
        run: sh scripts/crud-test.sh

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop test stack
        if: always()
        run: docker compose down -v

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-react
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/taskapp-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/taskapp-frontend:latest

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend-php
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/taskapp-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/taskapp-backend:latest
